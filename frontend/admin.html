<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - EViENT POS</title>
    <meta name="description" content="Trang quản trị hệ thống EViENT POS - Quản lý sản phẩm, nhân viên, đơn hàng">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        slate: {
                            900: '#0F172A',
                            800: '#1E293B',
                            700: '#334155',
                            600: '#475569',
                            500: '#64748B',
                            400: '#94A3B8',
                            300: '#CBD5E1',
                            200: '#E2E8F0',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Config & Core Scripts -->
    <script src="config.js?v=9"></script>
    <script src="js/api.js?v=9"></script>
    <script src="js/auth.js?v=9"></script>
    <script src="js/pos.js?v=9"></script>
    <script src="js/admin.js?v=9"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col">

    <!-- ========== HEADER BAR ========== -->
    <header class="bg-slate-800 border-b border-slate-700 px-4 py-2.5 flex items-center justify-between flex-shrink-0">
        <!-- Left: Logo -->
        <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-blue-500/10">
                <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/>
                </svg>
            </div>
            <h1 class="text-lg font-bold text-white">
                EViENT <span class="text-blue-500">POS</span>
                <span class="text-slate-500 font-normal text-sm ml-1">/ Quản trị</span>
            </h1>
        </div>

        <!-- Right: User info & Actions -->
        <div class="flex items-center gap-2">
            <span class="text-slate-400 text-sm mr-2 hidden sm:inline" id="user-display-name">Admin</span>

            <!-- Back to POS -->
            <a href="index.html" id="link-pos"
               class="btn btn-ghost text-sm gap-1.5">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/>
                </svg>
                <span class="hidden sm:inline">Về POS</span>
            </a>

            <!-- End Shift -->
            <button id="btn-end-shift" class="btn btn-ghost text-sm gap-1.5 text-red-400 hover:text-red-300">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                </svg>
                <span class="hidden sm:inline">Kết thúc ca</span>
            </button>
        </div>
    </header>

    <!-- ========== TABS BAR ========== -->
    <nav class="bg-slate-800 border-b border-slate-700 px-4 flex gap-1 overflow-x-auto flex-shrink-0">
        <button class="tab-btn active" data-tab="dashboard">
            <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z"/>
            </svg>
            Báo cáo
        </button>
        <button class="tab-btn" data-tab="products">
            <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            Sản phẩm
        </button>
        <button class="tab-btn" data-tab="users">
            <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
            </svg>
            Nhân viên
        </button>
        <button class="tab-btn" data-tab="orders">
            <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
            </svg>
            Đơn hàng
        </button>
        <button class="tab-btn" data-tab="logs">
            <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
            </svg>
            System Logs
        </button>
    </nav>

    <!-- ========== TAB PANELS ========== -->
    <main class="flex-1 overflow-y-auto">

        <!-- Tab: Dashboard -->
        <div id="panel-dashboard" class="tab-panel p-4" style="display: block;">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-white">Báo cáo Tổng Quan</h2>
            </div>
            <div id="dashboard-content">
                <!-- loadDashboard() injects here -->
            </div>
        </div>

        <!-- Tab: Products -->
        <div id="panel-products" class="tab-panel p-4" style="display: none;">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-white">Quản lý sản phẩm</h2>
                <button id="btn-add-product" class="btn btn-primary text-sm gap-1.5">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                    Thêm SP
                </button>
            </div>
            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                <div id="admin-products-table">
                    <!-- loadAdminProducts() injects here -->
                </div>
            </div>
            <div id="admin-products-pagination"></div>
        </div>

        <!-- Tab: Users -->
        <div id="panel-users" class="tab-panel p-4" style="display: none;">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-white">Quản lý nhân viên</h2>
                <button id="btn-add-user" class="btn btn-primary text-sm gap-1.5">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                    Thêm NV
                </button>
            </div>
            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                <div id="admin-users-table">
                    <!-- loadUsers() injects here -->
                </div>
            </div>
        </div>

        <!-- Tab: Orders -->
        <div id="panel-orders" class="tab-panel p-4" style="display: none;">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-white">Lịch sử đơn hàng</h2>
            </div>
            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                <div id="admin-orders-table">
                    <!-- loadOrders() injects here -->
                </div>
            </div>
            <div id="admin-orders-pagination"></div>
        </div>

        <!-- Tab: Logs -->
        <div id="panel-logs" class="tab-panel p-4" style="display: none;">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-white">System Logs</h2>
            </div>
            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                <div id="admin-logs-table">
                    <!-- loadLogs() injects here -->
                </div>
            </div>
            <div id="admin-logs-pagination"></div>
        </div>
    </main>

    <!-- ========== MODAL OVERLAY ========== -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h3 id="modal-title" class="text-lg font-semibold text-white">Modal</h3>
                <button class="qty-btn" onclick="closeModal()" aria-label="Đóng">×</button>
            </div>
            <div id="modal-body">
                <!-- Form content injected dynamically -->
            </div>
        </div>
    </div>

    <!-- ========== INIT ========== -->
    <script>
        (function () {
            const user = auth.checkAuth();
            if (!user) return;

            if (!auth.checkRole(['admin', 'manager'])) {
                alert('Bạn không có quyền truy cập trang quản trị.');
                window.location.href = 'index.html';
                return;
            }

            initAdmin();
        })();
    </script>
</body>
</html>
