<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - EViENT POS</title>
    <meta name="description" content="Màn hình bán hàng EViENT POS - Quản lý đơn hàng nhanh chóng">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        slate: {
                            900: '#0F172A',
                            800: '#1E293B',
                            700: '#334155',
                            600: '#475569',
                            500: '#64748B',
                            400: '#94A3B8',
                            300: '#CBD5E1',
                            200: '#E2E8F0',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=11">

    <!-- Config & Core Scripts -->
    <script src="config.js?v=10"></script>
    <script src="js/api.js?v=10"></script>
    <script src="js/auth.js?v=10"></script>
    <script src="js/barcode.js?v=10"></script>
    <script src="js/serial.js?v=10"></script>
    <script src="js/pos.js?v=11"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col">

    <!-- ========== HEADER BAR ========== -->
    <header class="bg-slate-800 border-b border-slate-700 px-4 py-2.5 flex items-center justify-between flex-shrink-0 no-print">
        <!-- Left: Logo -->
        <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-blue-500/10">
                <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/>
                </svg>
            </div>
            <h1 class="text-lg font-bold text-white">
                EViENT <span class="text-blue-500">POS</span>
            </h1>
        </div>

        <!-- Right: User info & Actions -->
        <div class="flex items-center gap-2">
            <span class="text-slate-400 text-sm mr-2 hidden sm:inline" id="user-display-name">Nhân viên</span>

            <!-- Admin Link -->
            <a href="admin.html" id="link-admin"
               class="btn btn-ghost text-sm gap-1.5">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.56.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.893.149c-.425.07-.765.383-.93.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 01-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.397.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.273-.806.108-1.204-.165-.397-.505-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.107-1.204l-.527-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <span class="hidden sm:inline">Quản trị</span>
            </a>

            <!-- Manage Drawer -->
            <button id="btn-manage-drawer" class="btn btn-ghost text-sm gap-1.5 text-emerald-400 hover:text-emerald-300">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="hidden sm:inline">Quản lý két</span>
            </button>

            <!-- Cash Drawer -->
            <button id="btn-cash-drawer" class="btn btn-ghost text-sm gap-1.5">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/>
                </svg>
                <span class="hidden sm:inline">Mở Két</span>
            </button>

            <!-- End Shift -->
            <button id="btn-end-shift" class="btn btn-ghost text-sm gap-1.5 text-red-400 hover:text-red-300">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                </svg>
                <span class="hidden sm:inline">Kết thúc ca</span>
            </button>
        </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">

        <!-- ===== LEFT COLUMN: CART (w-2/5) ===== -->
        <div id="cart-container" class="w-full lg:w-2/5 bg-slate-800 border-r border-slate-700 flex flex-col overflow-hidden">
            <!-- Cart Header -->
            <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between flex-shrink-0">
                <h2 class="text-base font-semibold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
                    </svg>
                    Giỏ Hàng
                </h2>
            </div>

            <!-- Cart Items (scrollable) -->
            <div id="cart-items" class="flex-1 overflow-y-auto px-4 py-2">
                <!-- renderCart() injects here -->
            </div>

            <!-- Cart Total -->
            <div class="border-t border-slate-700 flex-shrink-0">
                <div id="cart-total" class="px-4 py-3">
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 1.125rem;">
                        <span style="color: #94A3B8; font-weight: 500;">Tổng cộng:</span>
                        <span style="font-weight: 700; color: #E2E8F0;">0 đ</span>
                    </div>
                </div>

                <!-- Checkout Buttons -->
                <div class="px-4 pb-4 flex flex-col gap-3">
                    <div class="flex gap-3">
                        <button id="btn-checkout-cash" class="btn btn-success flex-1 text-sm font-semibold gap-2" disabled>
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/>
                            </svg>
                            Tiền Mặt
                        </button>
                        <button id="btn-checkout-bank" class="btn btn-primary flex-1 text-sm font-semibold gap-2" disabled>
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
                            </svg>
                            Chuyển Khoản
                        </button>
                    </div>
                    <button id="btn-checkout-split" class="btn bg-purple-600 hover:bg-purple-500 text-white flex-1 text-sm font-semibold gap-2" disabled>
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z" />
                        </svg>
                        Tách Bill (Tiền Mặt & Chuyển Khoản)
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== RIGHT COLUMN: PRODUCTS (w-3/5) ===== -->
        <div id="products-container" class="w-full lg:w-3/5 flex flex-col overflow-hidden">
            <!-- Search Bar -->
            <div class="px-4 py-3 border-b border-slate-700 flex-shrink-0">
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                    </svg>
                    <input
                        type="text"
                        id="search-input"
                        class="form-input pl-10"
                        placeholder="Tìm sản phẩm theo tên hoặc barcode..."
                        autocomplete="off"
                    >
                </div>
            </div>

            <!-- Product Grid (scrollable) -->
            <div class="flex-1 overflow-y-auto p-4">
                <div id="product-grid" class="pos-product-grid">
                    <!-- renderProducts() injects here -->
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="border-t border-slate-700 flex-shrink-0">
                <!-- renderPagination() injects here -->
            </div>
        </div>
    </main>

    <!-- ========== CHECKOUT MODAL ========== -->
    <div id="checkout-modal-overlay" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px; padding: 1.5rem; text-align: center;">
            <div id="checkout-modal-body">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <!-- ========== DRAWER MODAL ========== -->
    <div id="drawer-modal-overlay" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px; padding: 1.5rem;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-white">Quản lý Két tiền</h3>
                <button class="qty-btn" onclick="document.getElementById('drawer-modal-overlay').classList.remove('active')" aria-label="Đóng">×</button>
            </div>
            <div id="drawer-modal-body">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <!-- ========== PRE-ORDER FULFILL MODAL ========== -->
    <div id="preorder-fulfill-overlay" class="modal-overlay">
        <div class="modal-content" style="max-width: 560px; padding: 1.5rem;">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-white">📦 Đơn đặt trước</h3>
                <button class="qty-btn" onclick="document.getElementById('preorder-fulfill-overlay').classList.remove('active')" aria-label="Đóng">×</button>
            </div>
            <div id="preorder-fulfill-body">
                <!-- Content injected dynamically by showPreorderFulfillModal() -->
            </div>
        </div>
    </div>

    <!-- ========== INIT ========== -->
    <script>
        (function () {
            const user = auth.checkAuth();
            if (user) {
                initPOS();
            }
        })();
    </script>
</body>
</html>
