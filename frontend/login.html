<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - EViENT POS</title>
    <meta name="description" content="Đăng nhập hệ thống quản lý bán hàng EViENT POS">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        slate: {
                            900: '#0F172A',
                            800: '#1E293B',
                            700: '#334155',
                            600: '#475569',
                            500: '#64748B',
                            400: '#94A3B8',
                            300: '#CBD5E1',
                            200: '#E2E8F0',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=11">

    <!-- Config & Scripts -->
    <script src="config.js?v=10"></script>
    <script src="js/api.js?v=10"></script>
    <script src="js/auth.js?v=10"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Redirect if already logged in -->
    <script>
        if (auth.isLoggedIn()) {
            window.location.href = 'index.html';
        }
    </script>

    <!-- Login Card -->
    <div class="w-full max-w-md" x-data="loginForm()">

        <!-- Logo & Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500/10 border border-blue-500/20 mb-4">
                <svg class="w-8 h-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">
                EViENT <span class="text-blue-500">POS</span>
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Hệ thống quản lý bán hàng</p>
        </div>

        <!-- Login Form Card -->
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-xl">
            <form @submit.prevent="handleLogin" id="login-form">
                <!-- Username -->
                <div class="mb-4">
                    <label class="form-label" for="login-username">Tên đăng nhập</label>
                    <input
                        class="form-input"
                        id="login-username"
                        type="text"
                        x-model="username"
                        placeholder="Nhập username"
                        required
                        autocomplete="username"
                        autofocus
                    >
                </div>

                <!-- Password -->
                <div class="mb-6">
                    <label class="form-label" for="login-password">Mật khẩu</label>
                    <input
                        class="form-input"
                        id="login-password"
                        type="password"
                        x-model="password"
                        placeholder="Nhập mật khẩu"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <!-- Error Message -->
                <div x-show="error" x-cloak
                     class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm"
                     x-text="error">
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    class="btn btn-primary w-full text-base font-semibold"
                    :disabled="loading"
                    id="btn-login"
                >
                    <template x-if="loading">
                        <span class="flex items-center gap-2">
                            <span class="spinner spinner-sm" style="border-color: rgba(255,255,255,0.3); border-top-color: #fff;"></span>
                            Đang đăng nhập...
                        </span>
                    </template>
                    <template x-if="!loading">
                        <span>Đăng nhập</span>
                    </template>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-600 text-xs mt-6">
            &copy; 2026 EViENT POS. All rights reserved.
        </p>
    </div>

    <script>
        function loginForm() {
            return {
                username: '',
                password: '',
                loading: false,
                error: '',

                async handleLogin() {
                    this.error = '';
                    this.loading = true;

                    try {
                        await auth.login(this.username, this.password);
                        window.location.href = 'index.html';
                    } catch (err) {
                        this.error = err.message || 'Đăng nhập thất bại. Vui lòng kiểm tra lại thông tin.';
                    } finally {
                        this.loading = false;
                    }
                }
            };
        }
    </script>

    <!-- Alpine.js x-cloak style -->
    <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
